services:
  - type: web
    name: py-web-service
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSWORD
        value: admin
      - key: SECRET_KEY
        generateValue: true